<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Balade audio de Baudemont</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3a8a,#facc15);
}

#map{
    height:420px;
    border-radius:10px;
}
</style>

</head>

<body class="text-white">

<div class="max-w-5xl mx-auto p-4">

<h1 class="text-4xl font-bold text-center">
Balade audio de Baudemont
</h1>

<p class="text-center mb-4">
Réalisée avec les élèves de l'école primaire de Baudemont
</p>


<div id="map"></div>


<div id="etapes" class="grid md:grid-cols-2 gap-4 mt-5"></div>


</div>


<script>


// Création carte

const map = L.map('map').setView([46.295,4.29],15);


L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



// Chargement GPX

const gpx = new L.GPX('parcours.gpx', {

async:true,

polyline_options:{
    color:'red',
    weight:5,
    opacity:0.9
},

marker_options:{
    startIcon:false,
    endIcon:false,
    shadow:false
}

})


.on('loaded', function(e){

console.log("GPX chargé");

map.fitBounds(
e.target.getBounds()
);

})


.on('error', function(e){

console.error("Erreur GPX :",e);

alert("Impossible de charger le parcours GPX");

})


.addTo(map);




// Points audio

const etapesData=[


{
titre:"1. Le chat et le château",
texte:"Nael, Inès, Inaya, Thais, Marceau, Tom, Mia, Sophie, Lois, Albin, Tao, Lisa, Elio, Ryan, Noémie, Théo, Lyam, Juliette",
fichier:"Audio1.mp3",
coords:[46.293081,4.304922]
},


{
titre:"2. La place du champ de foire",
texte:"Mahé, Sophie",
fichier:"Audio2.mp3",
coords:[46.293998,4.302834]
},


{
titre:"3. La tour de l'enfer",
texte:"Inaya, Marceau, Albin, Loïs",
fichier:"Audio3.mp3",
coords:[46.295055,4.297096]
},


{
titre:"4. La croix de pelon",
texte:"Ryan, Elio, Tao, Juliette",
fichier:"Audio4.mp3",
coords:[46.299927,4.287363]
},


{
titre:"5. Le lavoir",
texte:"Mahé, Inès, Lyam, Noémie",
fichier:"Audio5.mp3",
coords:[46.301986,4.283852]
},


{
titre:"6. La maison aux boules",
texte:"Mia, Thays, Tom, Tao, Mahé",
fichier:"Audio6.mp3",
coords:[46.302361,4.281827]
},


{
titre:"7. La plus vieille maison de Baudemont",
texte:"Inaya, Ryan, Albin, Lisa, Marceau, Lyam",
fichier:"Audio7.mp3",
coords:[46.30293,4.277077]
},


{
titre:"8. L'ancien cimetière",
texte:"Théo, Inès, Juliette, Noémie",
fichier:"Audio8.mp3",
coords:[46.301694,4.277389]
},


{
titre:"9. La barrière et le trésor",
texte:"Thays, Mia, Lyam, Loïs, Naël, Elio, Sophie, Lyam",
fichier:"Audio9.mp3",
coords:[46.293385,4.28639]
},


{
titre:"10. L'ordre de Malte",
texte:"Albin, Mia, Mahé",
fichier:"Audio10.mp3",
coords:[46.293292,4.287246]
},


{
titre:"11. Les forges",
texte:"Tom, Loïs, Juliette, Thays, Naël, Théo, Lisa",
fichier:"Audio11.mp3",
coords:[46.293092,4.298673]
}

];





const conteneur=document.getElementById("etapes");



etapesData.forEach((e)=>{


const carte=document.createElement("div");

carte.className=
"bg-white text-black rounded-lg p-4 shadow";


carte.innerHTML=`

<h2 class="text-xl font-bold">
${e.titre}
</h2>

<p>${e.texte}</p>


<audio controls class="w-full mt-3">

<source src="audio/${e.fichier}" type="audio/mpeg">

Votre navigateur ne supporte pas l'audio.

</audio>


<button class="mt-3 bg-yellow-400 px-3 py-2 rounded">

Voir sur la carte

</button>

`;



conteneur.appendChild(carte);



const marker =
L.marker(e.coords)
.addTo(map)
.bindPopup(e.titre);



carte.querySelector("button")
.onclick=function(){

map.setView(
marker.getLatLng(),
17
);

marker.openPopup();

};


});



</script>


</body>
</html>
